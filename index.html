<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fujin Jiang | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f7f6; /* 极浅的高级灰背景 */
            color: #333;
            /* 使用 Flexbox 让内容完美居中 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        /* 现代化的悬浮卡片设计 */
        .container {
            background: #ffffff;
            padding: 60px 50px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); /* 柔和的阴影 */
            max-width: 650px;
            width: 90%;
        }

        h1 {
            font-size: 2.8rem;
            color: #2c3e50;
            margin-bottom: 15px;
            font-weight: 600;
        }

        p {
            font-size: 1.1rem;
            color: #666;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        /* 按钮排版 */
        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: #ffffff;
            background-color: #3498db; /* 充满活力的主色调 */
            padding: 12px 30px;
            border-radius: 30px; /* 胶囊形状按钮 */
            font-weight: 600;
            transition: all 0.3s ease; /* 顺滑的动画过渡 */
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        nav a:hover {
            background-color: #2980b9;
            transform: translateY(-3px); /* 鼠标悬停时微微上浮 */
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
        }

        /* 首页按钮使用线框样式，区分主次 */
        .nav-outline {
            background-color: transparent;
            color: #3498db;
            border: 2px solid #3498db;
            box-shadow: none;
        }

        .nav-outline:hover {
            background-color: #3498db;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Site</h1>
        <p>Hello! I am an NSA program student at MITT. Welcome to my personal GitHub Pages website. This site is created to demonstrate web hosting and version control.</p>
        <nav>
            <a href="index.html" class="nav-outline">Home</a>
            <a href="photography.html">My Photography</a>
        </nav>
    </div>
</body>
</html>
